services:
  web:
    restart: unless-stopped
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    restart: unless-stopped
    environment:
      NODE_ENV: production

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  mailpit:
    restart: unless-stopped
