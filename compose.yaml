name: slide-agent

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-Slide Agent}
  APP_URL: ${APP_URL:-http://localhost:3000}
  DATABASE_URL: ${DATABASE_URL:-postgresql://slide_agent:slide_agent@postgres:5432/slide_agent}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
  STORAGE_ROOT: ${STORAGE_ROOT:-/app/storage}
  STORAGE_UPLOADS_DIR: ${STORAGE_UPLOADS_DIR:-uploads}
  STORAGE_ASSETS_DIR: ${STORAGE_ASSETS_DIR:-assets}
  STORAGE_EXPORTS_DIR: ${STORAGE_EXPORTS_DIR:-exports}
  STORAGE_TEMP_DIR: ${STORAGE_TEMP_DIR:-temporary}
  SMTP_HOST: ${SMTP_HOST:-mailpit}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@example.com}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Slide Agent}
  AUTH_SECRET: ${AUTH_SECRET:-change-me-in-coolify}
  CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-change-me-in-coolify}
  DEMO_LOGIN_EMAIL: ${DEMO_LOGIN_EMAIL:-demo@slide-agent.local}
  DEMO_LOGIN_PASSWORD: ${DEMO_LOGIN_PASSWORD:-DemoPassword!123}
  BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
  DEFAULT_UI_LOCALE: ${DEFAULT_UI_LOCALE:-en}
  DEFAULT_PRESENTATION_LOCALE: ${DEFAULT_PRESENTATION_LOCALE:-en}
  DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-EUR}
  GLOBAL_MAX_SLIDES: ${GLOBAL_MAX_SLIDES:-50}
  GLOBAL_MAX_UPLOAD_MB: ${GLOBAL_MAX_UPLOAD_MB:-100}
  USD_TO_EUR_EXCHANGE_RATE: ${USD_TO_EUR_EXCHANGE_RATE:-0.92}
  AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-mock}
  AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-800}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  ENABLE_PROMPT_CONTENT_LOGGING: ${ENABLE_PROMPT_CONTENT_LOGGING:-false}
  WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
  RUN_DATABASE_MIGRATIONS: ${RUN_DATABASE_MIGRATIONS:-true}

services:
  web:
    image: ${WEB_IMAGE:-slide-agent-web}:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - app-storage:/app/storage
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    image: ${WORKER_IMAGE:-slide-agent-worker}:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - path: .env
        required: false
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('node:fs');const p=(process.env.STORAGE_ROOT||'/app/storage')+'/ops/worker-heartbeat.json';try{const s=fs.statSync(p);process.exit(Date.now()-s.mtimeMs<60000?0:1)}catch{process.exit(1)}",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slide_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slide_agent}
      POSTGRES_DB: ${POSTGRES_DB:-slide_agent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slide_agent -d slide_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.21

  ollama:
    image: ollama/ollama:0.5.7
    profiles: ["local-models"]
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  redis-data:
  app-storage:
  ollama-data:
