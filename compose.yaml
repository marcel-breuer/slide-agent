name: slide-agent

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-Slide Agent}
  APP_URL: ${APP_URL:-http://localhost:3000}
  DATABASE_URL: ${DATABASE_URL:-postgresql://slide_agent:slide_agent@postgres:5432/slide_agent}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-user-uploads}
  S3_BUCKET_ASSETS: ${S3_BUCKET_ASSETS:-presentation-assets}
  S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-pptx-exports}
  S3_BUCKET_TEMP: ${S3_BUCKET_TEMP:-temporary}
  SMTP_HOST: ${SMTP_HOST:-mailpit}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@example.com}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Slide Agent}
  AUTH_SECRET: ${AUTH_SECRET:-change-me-in-coolify}
  CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-change-me-in-coolify}
  BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
  DEFAULT_UI_LOCALE: ${DEFAULT_UI_LOCALE:-en}
  DEFAULT_PRESENTATION_LOCALE: ${DEFAULT_PRESENTATION_LOCALE:-en}
  DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-EUR}
  GLOBAL_MAX_SLIDES: ${GLOBAL_MAX_SLIDES:-50}
  GLOBAL_MAX_UPLOAD_MB: ${GLOBAL_MAX_UPLOAD_MB:-100}
  USD_TO_EUR_EXCHANGE_RATE: ${USD_TO_EUR_EXCHANGE_RATE:-0.92}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  ENABLE_PROMPT_CONTENT_LOGGING: ${ENABLE_PROMPT_CONTENT_LOGGING:-false}
  WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - path: .env
        required: false
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slide_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slide_agent}
      POSTGRES_DB: ${POSTGRES_DB:-slide_agent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slide_agent -d slide_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-user-uploads}
      S3_BUCKET_ASSETS: ${S3_BUCKET_ASSETS:-presentation-assets}
      S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-pptx-exports}
      S3_BUCKET_TEMP: ${S3_BUCKET_TEMP:-temporary}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local $$S3_ENDPOINT $$S3_ACCESS_KEY_ID $$S3_SECRET_ACCESS_KEY;
      mc mb -p local/$$S3_BUCKET_UPLOADS local/$$S3_BUCKET_ASSETS local/generated-images local/pptx-imports local/$$S3_BUCKET_EXPORTS local/previews local/$$S3_BUCKET_TEMP;
      exit 0;
      "

  mailpit:
    image: axllent/mailpit:v1.21

  ollama:
    image: ollama/ollama:0.5.7
    profiles: ["local-models"]
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  redis-data:
  minio-data:
  ollama-data:
